name: Vercel QR Code

on:
  deployment_status:

jobs:
  post-qr-code:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.creator.login == 'vercel[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get PR Number
        id: get_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.deployment.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha
            });

            const openPrs = prs.data.filter((pr) => pr.state === 'open');
            const deploymentRef = context.payload.deployment.ref;
            
            // Match the PR's head ref to the deployment ref to handle stacked PRs properly
            let targetPr = openPrs.find((pr) => pr.head.ref === deploymentRef);
            
            // Fallback to first open PR only if the deployment ref is the SHA itself rather than a branch name
            if (!targetPr && deploymentRef === sha && openPrs.length > 0) {
              targetPr = openPrs[0];
            }

            if (targetPr) {
              return targetPr.number;
            }
            return null;

      - name: Post QR Code Comment
        if: steps.get_pr.outputs.result != 'null'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.get_pr.outputs.result }}
          body: |
            ## 📱 Mobile Preview
            Scan this QR code to test this deployment on your phone:
            
            ![QR Code](https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${{ github.event.deployment_status.target_url }})
            
            **Link:** [${{ github.event.deployment_status.target_url }}](${{ github.event.deployment_status.target_url }})
